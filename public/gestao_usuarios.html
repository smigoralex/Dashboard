<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários</title>
    <link rel="stylesheet" href="css/admin_style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/painel_gestao.html" class="button back-button">← Voltar ao Painel</a>
            <h1>Gestão de Usuários</h1>
        </div>
    </header>

    <main>
        <div class="management-section">
            <div class="section-header">
                <h3>Todos os Usuários</h3>
                <button id="add-user-btn" class="button action-button">Adicionar Novo Usuário</button>
            </div>
            <div id="users-table-container"></div>
        </div>
    </main>

    <div id="user-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">Adicionar Novo Usuário</h3>
            <form id="user-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="modal-username">Nome de Usuário</label>
                        <input type="text" id="modal-username" name="nome_usuario" required>
                    </div>
                    <div class="form-group">
                        <label for="modal-password">Senha (mínimo 6 caracteres)</label>
                        <input type="password" id="modal-password" name="senha" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="modal-permission">Permissão</label>
                        <select id="modal-permission" name="permissao" required>
                            <option value="admin">Admin</option>
                            <option value="superadmin">Superadmin</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-user-btn" class="button cancel-button">Cancelar</button>
                    <button type="submit" class="button action-button">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="password-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Alterar Senha para <span id="password-modal-username" style="color: var(--primary-600);"></span></h3>
            <form id="password-form">
                <input type="hidden" id="password-modal-userid">
                <div class="form-group">
                    <label for="password-modal-new-password">Nova Senha (mínimo 6 caracteres)</label>
                    <input type="password" id="password-modal-new-password" required minlength="6">
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-password-btn" class="button cancel-button">Cancelar</button>
                    <button type="submit" class="button action-button">Salvar Nova Senha</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>Sistema de Gestão de Avaliações © 2025</p>
    </footer>

    <script type="module" src="js/gestao_usuarios.js"></script>
</body>
</html>
